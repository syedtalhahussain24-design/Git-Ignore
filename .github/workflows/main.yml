name: Git-Ignore

on:
  push:
    branches: [main]

jobs:
  Ignore-app:
     runs-on: ubuntu-latest

     steps:
      -  uses: actions/checkout@v7.0.0
      -  name: setup node js
         uses: actions/setup-node@v6.4.0
         with:
      -  name: install dependencies
         run : npm install
      -  name : Ignore app
         run : npm run build
      
